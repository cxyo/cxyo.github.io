name: Update ETF Data

on:
  schedule:
    # A股交易时间（UTC时间，中国是UTC+8）
    # 上午 9:30-11:30 (UTC 1:30-3:30) - 每15分钟
    - cron: '15,30,45 1 * * 1-5'
    - cron: '0,15,30 2 * * 1-5'
    - cron: '0,15,30 3 * * 1-5'
    # 下午 13:00-15:00 (UTC 5:00-7:00) - 每15分钟
    - cron: '0,15,30,45 5 * * 1-5'
    - cron: '0,15,30,45 6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crawl_etf_github.py'
      - 'requirements.txt'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./requirements.txt

      - name: Crawl ETF data
        run: python ./crawl_etf_github.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add etf_data.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ETF data - $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
